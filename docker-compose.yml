services:
  postgres:
    image: postgres:17-alpine
    container_name: vandepot-postgres
    ports:
      - "${POSTGRES_PORT:-5438}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vandepot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vandepot}
      POSTGRES_DB: ${POSTGRES_DB:-vandepot}
    volumes:
      - vandepot-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vandepot}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vandepot-network

  redis:
    image: redis:7-alpine
    container_name: vandepot-redis
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - vandepot-redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vandepot-network

volumes:
  vandepot-postgres_data:
  vandepot-redis_data:

networks:
  vandepot-network:
    driver: bridge
